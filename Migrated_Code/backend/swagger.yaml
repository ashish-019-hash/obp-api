openapi: 3.0.3
info:
  title: OBP API v5.1.0 - Bank and User Creation
  description: |
    Open Bank Project API v5.1.0 - Bank and User Creation Endpoints
    
    This API provides endpoints for creating banks and users in the OBP system.
    Based on Scala patterns from earlier API versions (v5.0.0, v4.0.0, v2.2.0).
  version: 5.1.0
  contact:
    name: Open Bank Project
    url: https://www.openbankproject.com
  license:
    name: AGPL V3
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: http://localhost:8080/obp/v5.1.0
    description: Local development server

paths:
  /banks:
    post:
      tags:
        - Bank Management
      summary: Create a new bank
      description: |
        Creates a new bank in the OBP system. This endpoint allows authorized users
        to register a new bank with all required details including routing information.
        
        Based on Scala implementation patterns from v5.0.0, v4.0.0, and v2.2.0.
      operationId: createBank
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBankRequest'
            examples:
              example1:
                summary: Standard bank creation
                value:
                  id: "bank_001"
                  short_name: "OBP Bank"
                  full_name: "Open Bank Project Demo Bank"
                  logo: "https://static.openbankproject.com/images/sandbox/bank_x.png"
                  website: "https://www.example.com"
                  bank_routing_scheme: "OBP"
                  bank_routing_address: "obp.bank.001"
      responses:
        '201':
          description: Bank created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankResponse'
              examples:
                example1:
                  summary: Successful bank creation
                  value:
                    id: "bank_001"
                    short_name: "OBP Bank"
                    full_name: "Open Bank Project Demo Bank"
                    logo: "https://static.openbankproject.com/images/sandbox/bank_x.png"
                    website: "https://www.example.com"
                    bank_routing_scheme: "OBP"
                    bank_routing_address: "obp.bank.001"
                    created_at: "2024-01-15T10:30:00Z"
        '400':
          description: Bad request - Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_id:
                  summary: Invalid bank ID
                  value:
                    error: "Invalid bank ID"
                    message: "Bank ID must be between 3 and 50 characters"
                    code: 400
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - Bank ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Bank Management
      summary: Get all banks
      description: Retrieves a list of all banks in the system
      operationId: getBanks
      responses:
        '200':
          description: List of banks retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanksResponse'

  /banks/{bankId}:
    get:
      tags:
        - Bank Management
      summary: Get bank by ID
      description: Retrieves detailed information about a specific bank
      operationId: getBankById
      parameters:
        - name: bankId
          in: path
          required: true
          description: Unique identifier of the bank
          schema:
            type: string
            minLength: 3
            maxLength: 50
          example: "bank_001"
      responses:
        '200':
          description: Bank details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankResponse'
        '404':
          description: Bank not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    post:
      tags:
        - User Management
      summary: Create a new user
      description: |
        Creates a new user account in the OBP system. This endpoint allows
        registration of new users with local authentication provider.
        
        Based on Scala implementation patterns from v4.0.0 user onboarding scenarios.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              example1:
                summary: Standard user creation
                value:
                  username: "john_doe"
                  email: "john.doe@example.com"
                  password: "SecurePassword123!"
                  first_name: "John"
                  last_name: "Doe"
                  provider: "local"
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                example1:
                  summary: Successful user creation
                  value:
                    user_id: "user_1642248600"
                    username: "john_doe"
                    provider: "local"
                    email: "john.doe@example.com"
                    display_name: "John Doe"
                    is_locked: false
                    is_validated: false
        '400':
          description: Bad request - Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_fields:
                  summary: Missing required fields
                  value:
                    error: "Invalid JSON format"
                    message: "Key: 'CreateUserRequest.Username' Error:Field validation for 'Username' failed on the 'required' tag"
                    code: 400
        '409':
          description: Conflict - Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CreateBankRequest:
      type: object
      required:
        - id
        - short_name
        - full_name
      properties:
        id:
          type: string
          minLength: 3
          maxLength: 50
          description: Unique identifier for the bank
          example: "bank_001"
        short_name:
          type: string
          maxLength: 100
          description: Short display name of the bank
          example: "OBP Bank"
        full_name:
          type: string
          maxLength: 200
          description: Full legal name of the bank
          example: "Open Bank Project Demo Bank"
        logo:
          type: string
          format: uri
          description: URL to the bank's logo image
          example: "https://static.openbankproject.com/images/sandbox/bank_x.png"
        website:
          type: string
          format: uri
          description: Bank's official website URL
          example: "https://www.example.com"
        bank_routing_scheme:
          type: string
          maxLength: 50
          description: Routing scheme used by the bank
          example: "OBP"
        bank_routing_address:
          type: string
          maxLength: 100
          description: Routing address for the bank
          example: "obp.bank.001"

    BankResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the bank
          example: "bank_001"
        short_name:
          type: string
          description: Short display name of the bank
          example: "OBP Bank"
        full_name:
          type: string
          description: Full legal name of the bank
          example: "Open Bank Project Demo Bank"
        logo:
          type: string
          format: uri
          description: URL to the bank's logo image
          example: "https://static.openbankproject.com/images/sandbox/bank_x.png"
        website:
          type: string
          format: uri
          description: Bank's official website URL
          example: "https://www.example.com"
        bank_routing_scheme:
          type: string
          description: Routing scheme used by the bank
          example: "OBP"
        bank_routing_address:
          type: string
          description: Routing address for the bank
          example: "obp.bank.001"
        created_at:
          type: string
          format: date-time
          description: Timestamp when the bank was created
          example: "2024-01-15T10:30:00Z"

    BanksResponse:
      type: object
      properties:
        banks:
          type: array
          items:
            $ref: '#/components/schemas/BankResponse'
          description: List of banks

    CreateUserRequest:
      type: object
      required:
        - username
        - email
        - password
        - first_name
        - last_name
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: '^[a-zA-Z0-9_-]+$'
          description: Unique username for the user
          example: "john_doe"
        email:
          type: string
          format: email
          maxLength: 100
          description: User's email address
          example: "john.doe@example.com"
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: User's password (will be hashed)
          example: "SecurePassword123!"
        first_name:
          type: string
          maxLength: 50
          description: User's first name
          example: "John"
        last_name:
          type: string
          maxLength: 50
          description: User's last name
          example: "Doe"
        provider:
          type: string
          maxLength: 50
          description: Authentication provider (defaults to 'local')
          example: "local"
          default: "local"

    UserResponse:
      type: object
      properties:
        user_id:
          type: string
          description: Unique identifier of the user
          example: "user_1642248600"
        username:
          type: string
          description: Username of the user
          example: "john_doe"
        provider:
          type: string
          description: Authentication provider
          example: "local"
        email:
          type: string
          format: email
          description: User's email address
          example: "john.doe@example.com"
        display_name:
          type: string
          description: Display name of the user
          example: "John Doe"
        is_locked:
          type: boolean
          description: Whether the user account is locked
          example: false
        is_validated:
          type: boolean
          description: Whether the user account is validated
          example: false

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error type or category
          example: "Invalid JSON format"
        message:
          type: string
          description: Detailed error message
          example: "Bank ID must be between 3 and 50 characters"
        code:
          type: integer
          description: HTTP status code
          example: 400

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for API authentication
    
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: API key for authentication

security:
  - BearerAuth: []
  - ApiKeyAuth: []

tags:
  - name: Bank Management
    description: Operations for managing banks
  - name: User Management
    description: Operations for managing users
