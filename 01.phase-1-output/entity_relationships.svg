<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .entity-box { fill: #f8f9fa; stroke: #343a40; stroke-width: 2; }
      .core-banking { fill: #e3f2fd; stroke: #1976d2; }
      .customer-mgmt { fill: #f3e5f5; stroke: #7b1fa2; }
      .products { fill: #e8f5e8; stroke: #388e3c; }
      .infrastructure { fill: #fff3e0; stroke: #f57c00; }
      .supporting { fill: #fce4ec; stroke: #c2185b; }
      .entity-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .entity-attr { font-family: Arial, sans-serif; font-size: 11px; text-anchor: start; }
      .relationship { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .cardinality { font-family: Arial, sans-serif; font-size: 10px; fill: #333; text-anchor: middle; }
      .legend-text { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .legend-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="25" class="legend-title" text-anchor="middle" font-size="18">OBP-API Entity Relationship Model</text>
  <text x="700" y="45" class="legend-text" text-anchor="middle">Business Entities and Relationships - 16-9-2025</text>

  <!-- Core Banking Entities -->
  <!-- Bank -->
  <rect x="50" y="80" width="180" height="140" class="entity-box core-banking"/>
  <text x="140" y="100" class="entity-title">Bank</text>
  <text x="60" y="120" class="entity-attr">• bankId: BankId</text>
  <text x="60" y="135" class="entity-attr">• shortName: String</text>
  <text x="60" y="150" class="entity-attr">• fullName: String</text>
  <text x="60" y="165" class="entity-attr">• logoUrl: String</text>
  <text x="60" y="180" class="entity-attr">• websiteUrl: String</text>
  <text x="60" y="195" class="entity-attr">• swiftBic: String</text>
  <text x="60" y="210" class="entity-attr">• nationalIdentifier: String</text>

  <!-- BankAccount -->
  <rect x="300" y="80" width="180" height="160" class="entity-box core-banking"/>
  <text x="390" y="100" class="entity-title">BankAccount</text>
  <text x="310" y="120" class="entity-attr">• accountId: AccountId</text>
  <text x="310" y="135" class="entity-attr">• bankId: BankId</text>
  <text x="310" y="150" class="entity-attr">• accountType: String</text>
  <text x="310" y="165" class="entity-attr">• balance: BigDecimal</text>
  <text x="310" y="180" class="entity-attr">• currency: String</text>
  <text x="310" y="195" class="entity-attr">• name: String</text>
  <text x="310" y="210" class="entity-attr">• number: String</text>
  <text x="310" y="225" class="entity-attr">• branchId: String</text>

  <!-- Transaction -->
  <rect x="550" y="80" width="180" height="160" class="entity-box core-banking"/>
  <text x="640" y="100" class="entity-title">Transaction</text>
  <text x="560" y="120" class="entity-attr">• id: TransactionId</text>
  <text x="560" y="135" class="entity-attr">• thisAccount: BankIdAccountId</text>
  <text x="560" y="150" class="entity-attr">• otherAccount: Counterparty</text>
  <text x="560" y="165" class="entity-attr">• amount: BigDecimal</text>
  <text x="560" y="180" class="entity-attr">• currency: String</text>
  <text x="560" y="195" class="entity-attr">• description: String</text>
  <text x="560" y="210" class="entity-attr">• startDate: Date</text>
  <text x="560" y="225" class="entity-attr">• balance: BigDecimal</text>

  <!-- Counterparty -->
  <rect x="800" y="80" width="180" height="140" class="entity-box core-banking"/>
  <text x="890" y="100" class="entity-title">Counterparty</text>
  <text x="810" y="120" class="entity-attr">• counterpartyId: String</text>
  <text x="810" y="135" class="entity-attr">• counterpartyName: String</text>
  <text x="810" y="150" class="entity-attr">• thisBankId: String</text>
  <text x="810" y="165" class="entity-attr">• thisAccountId: String</text>
  <text x="810" y="180" class="entity-attr">• otherBankRoutingScheme: String</text>
  <text x="810" y="195" class="entity-attr">• isBeneficiary: Boolean</text>

  <!-- Customer Management Entities -->
  <!-- User -->
  <rect x="50" y="280" width="180" height="140" class="entity-box customer-mgmt"/>
  <text x="140" y="300" class="entity-title">User</text>
  <text x="60" y="320" class="entity-attr">• userPrimaryKey: UserPrimaryKey</text>
  <text x="60" y="335" class="entity-attr">• userId: String</text>
  <text x="60" y="350" class="entity-attr">• provider: String</text>
  <text x="60" y="365" class="entity-attr">• emailAddress: String</text>
  <text x="60" y="380" class="entity-attr">• name: String</text>
  <text x="60" y="395" class="entity-attr">• createdByConsentId: String</text>
  <text x="60" y="410" class="entity-attr">• isDeleted: Boolean</text>

  <!-- Customer -->
  <rect x="300" y="280" width="180" height="160" class="entity-box customer-mgmt"/>
  <text x="390" y="300" class="entity-title">Customer</text>
  <text x="310" y="320" class="entity-attr">• customerId: String</text>
  <text x="310" y="335" class="entity-attr">• bankId: String</text>
  <text x="310" y="350" class="entity-attr">• legalName: String</text>
  <text x="310" y="365" class="entity-attr">• mobileNumber: String</text>
  <text x="310" y="380" class="entity-attr">• email: String</text>
  <text x="310" y="395" class="entity-attr">• dateOfBirth: Date</text>
  <text x="310" y="410" class="entity-attr">• kycStatus: Boolean</text>
  <text x="310" y="425" class="entity-attr">• employmentStatus: String</text>

  <!-- Agent -->
  <rect x="550" y="280" width="180" height="120" class="entity-box customer-mgmt"/>
  <text x="640" y="300" class="entity-title">Agent</text>
  <text x="560" y="320" class="entity-attr">• agentId: String</text>
  <text x="560" y="335" class="entity-attr">• bankId: String</text>
  <text x="560" y="350" class="entity-attr">• legalName: String</text>
  <text x="560" y="365" class="entity-attr">• mobileNumber: String</text>
  <text x="560" y="380" class="entity-attr">• isConfirmedAgent: Boolean</text>

  <!-- Product Entities -->
  <!-- Product -->
  <rect x="50" y="480" width="180" height="140" class="entity-box products"/>
  <text x="140" y="500" class="entity-title">Product</text>
  <text x="60" y="520" class="entity-attr">• bankId: BankId</text>
  <text x="60" y="535" class="entity-attr">• productCode: ProductCode</text>
  <text x="60" y="550" class="entity-attr">• name: String</text>
  <text x="60" y="565" class="entity-attr">• category: String</text>
  <text x="60" y="580" class="entity-attr">• description: String</text>
  <text x="60" y="595" class="entity-attr">• moreInfoUrl: String</text>
  <text x="60" y="610" class="entity-attr">• termsAndConditionsUrl: String</text>

  <!-- PhysicalCard -->
  <rect x="300" y="480" width="180" height="160" class="entity-box products"/>
  <text x="390" y="500" class="entity-title">PhysicalCard</text>
  <text x="310" y="520" class="entity-attr">• cardId: String</text>
  <text x="310" y="535" class="entity-attr">• bankId: String</text>
  <text x="310" y="550" class="entity-attr">• bankCardNumber: String</text>
  <text x="310" y="565" class="entity-attr">• cardType: String</text>
  <text x="310" y="580" class="entity-attr">• nameOnCard: String</text>
  <text x="310" y="595" class="entity-attr">• validFrom: Date</text>
  <text x="310" y="610" class="entity-attr">• expires: Date</text>
  <text x="310" y="625" class="entity-attr">• customerId: String</text>

  <!-- Infrastructure Entities -->
  <!-- Branch -->
  <rect x="50" y="680" width="180" height="140" class="entity-box infrastructure"/>
  <text x="140" y="700" class="entity-title">Branch</text>
  <text x="60" y="720" class="entity-attr">• branchId: BranchId</text>
  <text x="60" y="735" class="entity-attr">• bankId: BankId</text>
  <text x="60" y="750" class="entity-attr">• name: String</text>
  <text x="60" y="765" class="entity-attr">• address: Address</text>
  <text x="60" y="780" class="entity-attr">• location: Location</text>
  <text x="60" y="795" class="entity-attr">• isAccessible: Boolean</text>
  <text x="60" y="810" class="entity-attr">• branchType: String</text>

  <!-- ATM -->
  <rect x="300" y="680" width="180" height="140" class="entity-box infrastructure"/>
  <text x="390" y="700" class="entity-title">ATM</text>
  <text x="310" y="720" class="entity-attr">• atmId: AtmId</text>
  <text x="310" y="735" class="entity-attr">• bankId: BankId</text>
  <text x="310" y="750" class="entity-attr">• name: String</text>
  <text x="310" y="765" class="entity-attr">• address: Address</text>
  <text x="310" y="780" class="entity-attr">• location: Location</text>
  <text x="310" y="795" class="entity-attr">• hasDepositCapability: Boolean</text>
  <text x="310" y="810" class="entity-attr">• supportedCurrencies: List[String]</text>

  <!-- Supporting Entities -->
  <!-- Address -->
  <rect x="550" y="680" width="160" height="120" class="entity-box supporting"/>
  <text x="630" y="700" class="entity-title">Address</text>
  <text x="560" y="720" class="entity-attr">• line1: String</text>
  <text x="560" y="735" class="entity-attr">• city: String</text>
  <text x="560" y="750" class="entity-attr">• state: String</text>
  <text x="560" y="765" class="entity-attr">• postCode: String</text>
  <text x="560" y="780" class="entity-attr">• countryCode: String</text>

  <!-- Location -->
  <rect x="750" y="680" width="160" height="100" class="entity-box supporting"/>
  <text x="830" y="700" class="entity-title">Location</text>
  <text x="760" y="720" class="entity-attr">• latitude: Double</text>
  <text x="760" y="735" class="entity-attr">• longitude: Double</text>
  <text x="760" y="750" class="entity-attr">• date: Date</text>
  <text x="760" y="765" class="entity-attr">• user: BasicUser</text>

  <!-- Relationships -->
  <!-- Bank to BankAccount (1:N) -->
  <line x1="230" y1="150" x2="300" y2="150" class="relationship"/>
  <text x="265" y="145" class="cardinality">1:N</text>

  <!-- Bank to Branch (1:N) -->
  <line x1="140" y1="220" x2="140" y2="680" class="relationship"/>
  <text x="150" y="450" class="cardinality">1:N</text>

  <!-- Bank to ATM (1:N) -->
  <line x1="180" y1="220" x2="180" y2="650" x2="300" y2="650" x2="300" y2="680" class="relationship"/>
  <text x="240" y="645" class="cardinality">1:N</text>

  <!-- Bank to Product (1:N) -->
  <line x1="140" y1="220" x2="140" y2="480" class="relationship"/>
  <text x="150" y="350" class="cardinality">1:N</text>

  <!-- Bank to Customer (1:N) -->
  <line x1="200" y1="220" x2="200" y2="250" x2="300" y2="250" x2="300" y2="280" class="relationship"/>
  <text x="250" y="245" class="cardinality">1:N</text>

  <!-- BankAccount to Transaction (1:N) -->
  <line x1="480" y1="150" x2="550" y2="150" class="relationship"/>
  <text x="515" y="145" class="cardinality">1:N</text>

  <!-- BankAccount to PhysicalCard (1:N) -->
  <line x1="390" y1="240" x2="390" y2="480" class="relationship"/>
  <text x="400" y="360" class="cardinality">1:N</text>

  <!-- Transaction to Counterparty (N:1) -->
  <line x1="730" y1="150" x2="800" y2="150" class="relationship"/>
  <text x="765" y="145" class="cardinality">N:1</text>

  <!-- User to Customer (N:M) -->
  <line x1="230" y1="350" x2="300" y2="350" class="relationship"/>
  <text x="265" y="345" class="cardinality">N:M</text>

  <!-- Customer to PhysicalCard (1:N) -->
  <line x1="390" y1="440" x2="390" y2="480" class="relationship"/>
  <text x="400" y="460" class="cardinality">1:N</text>

  <!-- Branch to Address (1:1) -->
  <line x1="230" y1="750" x2="550" y2="750" class="relationship"/>
  <text x="390" y="745" class="cardinality">1:1</text>

  <!-- ATM to Address (1:1) -->
  <line x1="480" y1="750" x2="550" y2="750" class="relationship"/>
  <text x="515" y="745" class="cardinality">1:1</text>

  <!-- Branch to Location (1:1) -->
  <line x1="230" y1="780" x2="500" y2="780" x2="500" y2="650" x2="750" y2="650" x2="750" y2="680" class="relationship"/>
  <text x="490" y="665" class="cardinality">1:1</text>

  <!-- ATM to Location (1:1) -->
  <line x1="480" y1="780" x2="520" y2="780" x2="520" y2="650" x2="750" y2="650" x2="750" y2="680" class="relationship"/>
  <text x="635" y="645" class="cardinality">1:1</text>

  <!-- Legend -->
  <rect x="1050" y="80" width="300" height="300" fill="none" stroke="#333" stroke-width="1"/>
  <text x="1200" y="105" class="legend-title" text-anchor="middle">Legend</text>
  
  <!-- Entity Types -->
  <text x="1070" y="130" class="legend-text" font-weight="bold">Entity Types:</text>
  <rect x="1070" y="140" width="20" height="15" class="core-banking"/>
  <text x="1100" y="152" class="legend-text">Core Banking</text>
  <rect x="1070" y="160" width="20" height="15" class="customer-mgmt"/>
  <text x="1100" y="172" class="legend-text">Customer Management</text>
  <rect x="1070" y="180" width="20" height="15" class="products"/>
  <text x="1100" y="192" class="legend-text">Products</text>
  <rect x="1070" y="200" width="20" height="15" class="infrastructure"/>
  <text x="1100" y="212" class="legend-text">Infrastructure</text>
  <rect x="1070" y="220" width="20" height="15" class="supporting"/>
  <text x="1100" y="232" class="legend-text">Supporting</text>

  <!-- Relationship Types -->
  <text x="1070" y="260" class="legend-text" font-weight="bold">Relationships:</text>
  <line x1="1070" y1="275" x2="1120" y2="275" class="relationship"/>
  <text x="1130" y="280" class="legend-text">1:1 - One to One</text>
  <line x1="1070" y1="295" x2="1120" y2="295" class="relationship"/>
  <text x="1130" y="300" class="legend-text">1:N - One to Many</text>
  <line x1="1070" y1="315" x2="1120" y2="315" class="relationship"/>
  <text x="1130" y="320" class="legend-text">N:M - Many to Many</text>

  <!-- Analysis Info -->
  <text x="1070" y="350" class="legend-text" font-weight="bold">Analysis Summary:</text>
  <text x="1070" y="365" class="legend-text">• 13 Core Business Entities</text>
  <text x="1070" y="380" class="legend-text">• 15 Primary Relationships</text>
  <text x="1070" y="395" class="legend-text">• 5 Domain Categories</text>

</svg>
