  <text x="50" y="2500" font-family="Arial, sans-serif" font-size="12" fill="#34495e">• Core FX handling supports all monetary calculations (BR-001, BR-002, BR-003)</text>
  <text x="50" y="2520" font-family="Arial, sans-serif" font-size="12" fill="#34495e">• Risk management through multi-dimensional limits (BR-004, BR-005, BR-006, BR-028)</text>
