  <text x="60" y="128" font-family="Arial, sans-serif" font-size="10" fill="white">with 14 supported currencies</text>
  <text x="60" y="145" font-family="Arial, sans-serif" font-size="9" fill="#e8f4fd">fx.scala:40-57</text>

