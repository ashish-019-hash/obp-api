  <text x="650" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34495e">35 Core Business Rules across 9 Categories</text>

  <!-- Currency Exchange & Conversion Rules (BR-001 to BR-003) -->
