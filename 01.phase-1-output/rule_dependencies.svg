  <text x="60" y="228" font-family="Arial, sans-serif" font-size="10" fill="white">with amounts and counts</text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="9" fill="#fdf2f2">MappedCounterpartyLimit.scala:54-75</text>

