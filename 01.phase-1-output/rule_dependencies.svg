  <text x="50" y="2620" font-family="Arial, sans-serif" font-size="12" fill="#34495e">• PSD2 compliance and funds verification (BR-031, BR-032)</text>
  <text x="50" y="2640" font-family="Arial, sans-serif" font-size="12" fill="#34495e">• ATM service management and availability (BR-033, BR-034)</text>
  
