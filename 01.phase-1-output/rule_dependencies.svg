  <text x="360" y="115" font-family="Arial, sans-serif" font-size="10" fill="white">BigDecimal multiplication with</text>
  <text x="360" y="128" font-family="Arial, sans-serif" font-size="10" fill="white">HALF_UP rounding</text>
  <text x="360" y="145" font-family="Arial, sans-serif" font-size="9" fill="#e8f4fd">fx.scala:127-130</text>

