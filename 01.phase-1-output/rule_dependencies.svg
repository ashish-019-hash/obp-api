  <text x="660" y="115" font-family="Arial, sans-serif" font-size="10" fill="white">Three-tier rate resolution:</text>
  <text x="660" y="128" font-family="Arial, sans-serif" font-size="10" fill="white">bank → cached → hardcoded</text>
  <text x="660" y="145" font-family="Arial, sans-serif" font-size="9" fill="#e8f4fd">fx.scala:151-162</text>

