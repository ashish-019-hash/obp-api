      in: path
      required: true
      description: Account identifier
      schema:
        type: string
        example: "8ca8a7e4-6d02-48e3-a029-0b2bf89de9f0"

    ViewId:
      name: viewId
      in: path
      required: true
      description: View identifier
      schema:
        type: string
        example: "owner"

    TransactionId:
      name: transactionId
      in: path
      required: true
      description: Transaction identifier
      schema:
        type: string
        example: "7d804f5e-bb6d-4e5c-9d5a-3b2c1a8e9f7d"

    AgentId:
      name: agentId
      in: path
      required: true
      description: Agent identifier
      schema:
        type: string
        example: "agent-123"

    Offset:
      name: offset
      in: query
      description: Number of records to skip for pagination
      schema:
        type: integer
        minimum: 0
        default: 0

    Limit:
      name: limit
      in: query
      description: Maximum number of records to return
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 50

