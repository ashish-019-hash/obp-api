openapi: 3.0.3
info:
  title: Open Bank Project API
  description: |
    Complete REST API specification for the Open Bank Project (OBP) API, extracted from Scala codebase.
    
    This specification covers multiple API versions and regulatory standards including:
    - OBP Standard APIs (v1.2.1 to v5.1.0)
    - Berlin Group PSD2 (v1.3)
    - UK Open Banking (v3.1.0)
    - Australian Consumer Data Right (v1.0.0)
    - Polish, STET, Bahrain OBF, and MxOF standards
    
    The API provides comprehensive banking services including account management, payment processing,
    customer operations, consent management, and regulatory compliance features.
  version: 5.1.0
  contact:
    name: Open Bank Project
    url: https://www.openbankproject.com
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: https://api.example.com
    description: Production server (placeholder)
  - url: https://api-sandbox.example.com
    description: Sandbox server (placeholder)

paths:
  /obp/v5.1.0/root:
    get:
      tags: [API Information]
      summary: Get API Information
      description: Get basic information about the API including version, status, and capabilities
      responses:
        '200':
          description: API information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiInfo'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /obp/v5.1.0/regulated-entities/{regulatedEntityId}:
    delete:
      tags: [Regulated Entities]
      summary: Delete Regulated Entity
      description: Delete a regulated entity by ID
      parameters:
        - name: regulatedEntityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Regulated entity deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /obp/v5.1.0/waiting-for-godot:
    get:
      tags: [Testing]
      summary: Waiting For Godot
      description: Test endpoint for performance testing and load simulation
      responses:
        '200':
          description: Test response
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bahrain-obf/v1.0.0/accounts/{accountId}:
    get:
      tags: [Bahrain OBF - Accounts]
      summary: Get Account by AccountId
      description: Get account details for Bahrain Open Banking Framework compliance
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  Meta:
                    type: object
                  Links:
                    type: object
                  Data:
                    type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bahrain-obf/v1.0.0/accounts:
    get:
      tags: [Bahrain OBF - Accounts]
      summary: Get Accounts
      description: Get all accounts for Bahrain Open Banking Framework compliance
      responses:
        '200':
          description: Accounts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  Meta:
                    type: object
                  Links:
                    type: object
                  Data:
                    type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bahrain-obf/v1.0.0/accounts/{accountId}/balances:
    get:
      tags: [Bahrain OBF - Balances]
      summary: Get Account Balances
      description: Get account balances for Bahrain Open Banking Framework compliance
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account balances retrieved successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bahrain-obf/v1.0.0/balances:
    get:
      tags: [Bahrain OBF - Balances]
      summary: Get Balances
      description: Get all balances for Bahrain Open Banking Framework compliance
      responses:
        '200':
          description: Balances retrieved successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bahrain-obf/v1.0.0/domestic-payment-consents:
    post:
      tags: [Bahrain OBF - Payments]
      summary: Create Domestic Payment Consent
      description: Create domestic payment consent for Bahrain OBF compliance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Domestic payment consent created successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /open-banking/v3.1.0/aisp/accounts:
    get:
      tags: [UK Open Banking - Accounts]
      summary: Get Accounts
      description: Get accounts for UK Open Banking compliance
      responses:
        '200':
          description: Accounts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  Meta:
                    type: object
                  Links:
                    type: object
                  Data:
                    type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /open-banking/v3.1.0/aisp/accounts/{accountId}:
    get:
      tags: [UK Open Banking - Accounts]
      summary: Get Account
      description: Get account details for UK Open Banking compliance
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account details retrieved successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /open-banking/v3.1.0/aisp/accounts/{accountId}/balances:
    get:
      tags: [UK Open Banking - Accounts]
      summary: Get Account Balances
      description: Get account balances for UK Open Banking compliance
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account balances retrieved successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /open-banking/v3.1.0/pisp/domestic-payment-consents:
    post:
      tags: [UK Open Banking - Payments]
      summary: Create Domestic Payment Consents
      description: Create domestic payment consent for UK Open Banking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Domestic payment consent created successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /open-banking/v3.1.0/pisp/domestic-payments:
    post:
      tags: [UK Open Banking - Payments]
      summary: Create Domestic Payments
      description: Create domestic payment for UK Open Banking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Domestic payment created successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /obp/v5.1.0/ui/suggested-session-timeout:
    get:
      tags: [API Information]
      summary: Get Suggested Session Timeout
      description: Get the suggested session timeout value for UI applications
      responses:
        '200':
          description: Session timeout retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestedSessionTimeout'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /obp/v5.1.0/banks:
    get:
      tags: [Banks]
      summary: Get Banks
      description: Get list of banks available in the system
      parameters:
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Banks retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanksList'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /obp/v5.1.0/banks/{bankId}:
    get:
      tags: [Banks]
      summary: Get Bank
      description: Get information about a specific bank
      parameters:
        - $ref: '#/components/parameters/BankId'
      responses:
        '200':
          description: Bank information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bank'
        '404':
          $ref: '#/components/responses/BankNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /obp/v5.1.0/banks/{bankId}/agents:
    post:
      tags: [Agents]
      summary: Create Agent
      description: Create a new agent for the specified bank
      parameters:
        - $ref: '#/components/parameters/BankId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostAgent'
      responses:
        '201':
          description: Agent created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/BankNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanCreateAgent]

    get:
      tags: [Agents]
      summary: Get Agents
      description: Get list of agents for the specified bank
      parameters:
        - $ref: '#/components/parameters/BankId'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Agents retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentsList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/BankNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanGetAgents]

  /obp/v5.1.0/banks/{bankId}/agents/{agentId}:
    get:
      tags: [Agents]
      summary: Get Agent
      description: Get information about a specific agent
      parameters:
        - $ref: '#/components/parameters/BankId'
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Agent information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanGetAgent]

    put:
      tags: [Agents]
      summary: Update Agent Status
      description: Update the status of an existing agent
      parameters:
        - $ref: '#/components/parameters/BankId'
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutAgent'
      responses:
        '200':
          description: Agent status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanUpdateAgentStatus]

  /obp/v5.1.0/banks/{bankId}/accounts:
    get:
      tags: [Accounts]
      summary: Get Accounts at Bank
      description: Get list of accounts at the specified bank
      parameters:
        - $ref: '#/components/parameters/BankId'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Accounts retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/BankNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanGetAccounts]

    post:
      tags: [Accounts]
      summary: Create Account
      description: Create a new account at the specified bank
      parameters:
        - $ref: '#/components/parameters/BankId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostAccount'
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/BankNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanCreateAccount]

  /obp/v5.1.0/banks/{bankId}/accounts/{accountId}:
    get:
      tags: [Accounts]
      summary: Get Account
      description: Get information about a specific account
      parameters:
        - $ref: '#/components/parameters/BankId'
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Account information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanGetAccount]

  /obp/v5.1.0/banks/{bankId}/accounts/{accountId}/balances:
    get:
      tags: [Accounts]
      summary: Get Account Balances
      description: Get balance information for a specific account
      parameters:
        - $ref: '#/components/parameters/BankId'
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Account balances retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalances'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanGetBalances]

  /obp/v5.1.0/banks/{bankId}/accounts/{accountId}/{viewId}/transactions:
    get:
      tags: [Transactions]
      summary: Get Transactions
      description: Get list of transactions for an account through a specific view
      parameters:
        - $ref: '#/components/parameters/BankId'
        - $ref: '#/components/parameters/AccountId'
        - $ref: '#/components/parameters/ViewId'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
        - name: from_date
          in: query
          description: Start date for transaction filtering
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          description: End date for transaction filtering
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Transactions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionsList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanGetTransactions]

  /obp/v5.1.0/banks/{bankId}/accounts/{accountId}/{viewId}/transactions/{transactionId}:
    get:
      tags: [Transactions]
      summary: Get Transaction
      description: Get information about a specific transaction
      parameters:
        - $ref: '#/components/parameters/BankId'
        - $ref: '#/components/parameters/AccountId'
        - $ref: '#/components/parameters/ViewId'
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '200':
          description: Transaction information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanGetTransaction]

  /obp/v5.1.0/banks/{bankId}/accounts/{accountId}/{viewId}/transaction-request-types/SEPA/transaction-requests:
    post:
      tags: [Transaction Requests]
      summary: Create SEPA Transaction Request
      description: Create a new SEPA transaction request
      parameters:
        - $ref: '#/components/parameters/BankId'
        - $ref: '#/components/parameters/AccountId'
        - $ref: '#/components/parameters/ViewId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostTransactionRequest'
      responses:
        '201':
          description: Transaction request created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanCreateTransactionRequest]

  /obp/v5.1.0/banks/{bankId}/customers:
    get:
      tags: [Customers]
      summary: Get Customers
      description: Get list of customers for the specified bank
      parameters:
        - $ref: '#/components/parameters/BankId'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Customers retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomersList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/BankNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanGetCustomers]

    post:
      tags: [Customers]
      summary: Create Customer
      description: Create a new customer for the specified bank
      parameters:
        - $ref: '#/components/parameters/BankId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCustomer'
      responses:
        '201':
          description: Customer created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/BankNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanCreateCustomer]

  /obp/v5.1.0/banks/{bankId}/my/consents:
    get:
      tags: [Consents]
      summary: Get My Consents at Bank
      description: Get list of consents for the current user at the specified bank
      parameters:
        - $ref: '#/components/parameters/BankId'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Consents retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentsList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/BankNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanGetConsents]

  /obp/v5.1.0/consumer/consents:
    post:
      tags: [Consents]
      summary: Create Consent
      description: Create a new consent for data access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostConsent'
      responses:
        '201':
          description: Consent created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [CanCreateConsent]

  /berlin-group/v1.3/accounts:
    get:
      tags: [Berlin Group - Accounts]
      summary: Get Account List
      description: Get list of accounts accessible to the current user (Berlin Group PSD2)
      parameters:
        - name: withBalance
          in: query
          description: Include balance information
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Account list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BerlinGroupAccountList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [AIS]

  /berlin-group/v1.3/accounts/{account-id}/balances:
    get:
      tags: [Berlin Group - Accounts]
      summary: Get Account Balances
      description: Get balance information for a specific account (Berlin Group PSD2)
      parameters:
        - name: account-id
          in: path
          required: true
          description: Account identifier
          schema:
            type: string
      responses:
        '200':
          description: Account balances retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BerlinGroupBalances'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [AIS]

  /berlin-group/v1.3/payments/sepa-credit-transfers:
    post:
      tags: [Berlin Group - Payments]
      summary: Initiate SEPA Credit Transfer
      description: Initiate a SEPA credit transfer payment (Berlin Group PSD2)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BerlinGroupSepaCreditTransfer'
      responses:
        '201':
          description: Payment initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BerlinGroupPaymentInitiation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [PIS]

  /open-banking/v3.1.0/aisp/accounts:
    get:
      tags: [UK Open Banking - Accounts]
      summary: Get Accounts
      description: Get list of accounts accessible to the current user (UK Open Banking)
      responses:
        '200':
          description: Account list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UKOpenBankingAccountList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [accounts]

  /open-banking/v3.1.0/aisp/accounts/{AccountId}/balances:
    get:
      tags: [UK Open Banking - Accounts]
      summary: Get Account Balances
      description: Get balance information for a specific account (UK Open Banking)
      parameters:
        - name: AccountId
          in: path
          required: true
          description: Account identifier
          schema:
            type: string
      responses:
        '200':
          description: Account balances retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UKOpenBankingBalances'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [accounts]

  /cds-au/v1.0.0/banking/accounts:
    get:
      tags: [Australian CDR - Banking]
      summary: Get Accounts
      description: Get list of accounts accessible to the current user (Australian CDR)
      parameters:
        - name: product-category
          in: query
          description: Filter accounts by product category
          schema:
            type: string
            enum: [TRANS_AND_SAVINGS_ACCOUNTS, TERM_DEPOSITS, TRAVEL_CARDS, REGULATED_TRUST_ACCOUNTS, RESIDENTIAL_MORTGAGES, CRED_AND_CHRG_CARDS, PERS_LOANS, MARGIN_LOANS, LEASES, TRADE_FINANCE, OVERDRAFTS, BUSINESS_LOANS]
      responses:
        '200':
          description: Account list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AustralianCDRAccountList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2: [bank:accounts.basic:read]

components:
