          tokenUrl: https://api.example.com/oauth/token
          scopes:
            CanCreateAgent: Create agents
            CanGetAgents: View agents
            CanGetAgent: View specific agent
            CanUpdateAgentStatus: Update agent status
            CanGetAccounts: View accounts
            CanCreateAccount: Create accounts
            CanGetAccount: View specific account
            CanGetBalances: View account balances
            CanGetTransactions: View transactions
            CanGetTransaction: View specific transaction
            CanCreateTransactionRequest: Create transaction requests
            CanGetCustomers: View customers
            CanCreateCustomer: Create customers
            CanGetConsents: View consents
            CanCreateConsent: Create consents
