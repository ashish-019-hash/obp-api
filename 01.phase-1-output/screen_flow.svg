  <rect x="850" y="350" width="120" height="60" class="auth-screen" rx="5"/>
  <text x="910" y="370" class="screen-title">AUTH_CONTEXT_UPDATE</text>
  <text x="910" y="385" class="screen-text">add-user-auth-context-update-request.html</text>
  <text x="910" y="395" class="screen-text">Auth Context Update</text>

  <rect x="1050" y="350" width="120" height="60" class="auth-screen" rx="5"/>
  <text x="1110" y="370" class="screen-title">CONFIRM_AUTH_UPDATE</text>
  <text x="1110" y="385" class="screen-text">confirm-user-auth-context-update-request.html</text>
  <text x="1110" y="395" class="screen-text">Confirm Auth Update</text>

  <!-- Information Screens -->
  <rect x="50" y="450" width="120" height="60" class="screen" rx="5"/>
  <text x="110" y="470" class="screen-title">USER_INFORMATION</text>
  <text x="110" y="485" class="screen-text">user-information.html</text>
  <text x="110" y="495" class="screen-text">User Info</text>

  <rect x="250" y="450" width="120" height="60" class="screen" rx="5"/>
  <text x="310" y="470" class="screen-title">INTRODUCTION</text>
  <text x="310" y="485" class="screen-text">introduction.html</text>
  <text x="310" y="495" class="screen-text">API Introduction</text>

  <rect x="450" y="450" width="120" height="60" class="screen" rx="5"/>
  <text x="510" y="470" class="screen-title">SDKS</text>
  <text x="510" y="485" class="screen-text">sdks.html</text>
  <text x="510" y="495" class="screen-text">SDK Showcase</text>

  <!-- External/Success States -->
  <rect x="850" y="450" width="120" height="60" class="screen" rx="5"/>
  <text x="910" y="470" class="screen-title">EXTERNAL_REDIRECT</text>
  <text x="910" y="485" class="screen-text">External Application</text>
  <text x="910" y="495" class="screen-text">Third Party App</text>

  <!-- Navigation Edges -->
  
  <!-- Home to Login -->
  <path d="M 170 80 L 240 80" class="edge auth-edge"/>
  <text x="205" y="75" class="edge-label">Login Link</text>

  <!-- Login to Home -->
  <path d="M 310 50 Q 310 30 110 30 Q 110 40 110 50" class="edge success-edge"/>
  <text x="210" y="25" class="edge-label">Login Success</text>

  <!-- Login to Password Reset -->
  <path d="M 370 80 L 640 80" class="edge"/>
  <text x="505" y="75" class="edge-label">Forgot Password</text>

  <!-- Login to Signup -->
  <path d="M 370 80 L 440 80" class="edge"/>
  <text x="405" y="75" class="edge-label">Register</text>

  <!-- Home to Consumer Registration -->
  <path d="M 110 110 Q 110 130 510 130 Q 510 140 510 150" class="edge"/>
  <text x="310" y="125" class="edge-label">Register App</text>

  <!-- Consumer Registration to Success -->
  <path d="M 570 180 L 640 180" class="edge success-edge"/>
  <text x="605" y="175" class="edge-label">Submit Form</text>

  <!-- Consumer Success to Dummy Tokens -->
  <path d="M 710 210 Q 710 330 710 350" class="edge"/>
  <text x="725" y="280" class="edge-label">Get Tokens</text>

  <!-- OAuth Authorization Flow -->
  <path d="M 110 150 Q 110 130 310 130 Q 310 140 310 150" class="edge oauth-edge"/>
  <text x="210" y="125" class="edge-label">OAuth Success</text>

  <!-- OAuth to Login (if not authenticated) -->
  <path d="M 110 150 Q 50 150 50 80 Q 50 80 250 80" class="edge auth-edge"/>
  <text x="100" y="115" class="edge-label">Auth Required</text>

  <!-- User Invitation Flow -->
  <path d="M 910 110 L 910 130 Q 910 140 710 140 Q 710 150 710 110" class="edge success-edge"/>
  <text x="810" y="135" class="edge-label">Valid Invitation</text>

  <!-- Invalid Invitation -->
  <path d="M 970 80 L 1040 80" class="edge error-edge"/>
  <text x="1005" y="75" class="edge-label">Invalid/Expired</text>

  <!-- Already Logged In Warning -->
  <path d="M 1030 80 L 1240 80" class="edge error-edge"/>
  <text x="1135" y="75" class="edge-label">Already Logged In</text>

  <!-- Consent Screens Flow -->
  <path d="M 110 250 Q 50 250 50 80 Q 50 80 100 80" class="edge success-edge"/>
  <text x="75" y="165" class="edge-label">Allow</text>

  <path d="M 110 250 Q 30 250 30 80 Q 30 80 100 80" class="edge error-edge"/>
  <text x="65" y="165" class="edge-label">Deny</text>

  <!-- Berlin Group Consent Flow -->
  <path d="M 570 280 L 640 280" class="edge"/>
  <text x="605" y="275" class="edge-label">SCA Required</text>

  <path d="M 710 250 Q 710 230 910 230 Q 910 240 910 250" class="edge"/>
  <text x="810" y="235" class="edge-label">External Redirect</text>

  <!-- OTP Validation -->
  <path d="M 910 310 Q 910 330 110 330 Q 110 340 110 350" class="edge success-edge"/>
  <text x="510" y="325" class="edge-label">OTP Success</text>

  <!-- Terms and Privacy to Home -->
  <path d="M 110 350 Q 50 350 50 80 Q 50 80 100 80" class="edge"/>
  <text x="75" y="215" class="edge-label">Accept/Skip</text>

  <path d="M 310 350 Q 250 350 250 80 Q 250 80 300 80" class="edge"/>
  <text x="275" y="215" class="edge-label">Accept/Skip</text>

  <!-- Auth Context Update Flow -->
  <path d="M 970 380 L 1040 380" class="edge"/>
  <text x="1005" y="375" class="edge-label">Submit</text>

  <path d="M 1110 350 Q 1110 330 110 330 Q 110 340 110 350" class="edge success-edge"/>
  <text x="610" y="325" class="edge-label">OTP Success</text>

  <!-- Date stamp -->
  <text x="1300" y="980" class="edge-label" font-size="10">Analysis Date: 16-9-2025</text>

  <!-- Legend -->
  <rect x="50" y="550" width="300" height="150" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="200" y="570" class="screen-title">Legend</text>
  
  <rect x="60" y="580" width="20" height="15" class="screen"/>
  <text x="90" y="592" class="edge-label">General Screens</text>
  
  <rect x="60" y="600" width="20" height="15" class="auth-screen"/>
  <text x="90" y="612" class="edge-label">Authentication Screens</text>
  
  <rect x="60" y="620" width="20" height="15" class="oauth-screen"/>
  <text x="90" y="632" class="edge-label">OAuth Screens</text>
  
  <rect x="180" y="580" width="20" height="15" class="consent-screen"/>
  <text x="210" y="592" class="edge-label">Consent Screens</text>
  
  <rect x="180" y="600" width="20" height="15" class="admin-screen"/>
  <text x="210" y="612" class="edge-label">Admin/Management</text>
  
  <rect x="180" y="620" width="20" height="15" class="error-screen"/>
  <text x="210" y="632" class="edge-label">Error Screens</text>

  <line x1="60" y1="650" x2="80" y2="650" class="edge success-edge"/>
  <text x="90" y="655" class="edge-label">Success Flow</text>
  
  <line x1="60" y1="665" x2="80" y2="665" class="edge error-edge"/>
  <text x="90" y="670" class="edge-label">Error Flow</text>
  
  <line x1="180" y1="650" x2="200" y2="650" class="edge auth-edge"/>
  <text x="210" y="655" class="edge-label">Auth Required</text>
  
  <line x1="180" y1="665" x2="200" y2="665" class="edge oauth-edge"/>
  <text x="210" y="670" class="edge-label">OAuth Flow</text>

</svg>
